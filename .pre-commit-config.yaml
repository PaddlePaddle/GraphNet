repos:
- repo: https://github.com/psf/black
  rev: 23.1.0
  hooks:
  - id: black
    language_version: python3

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.14.4
  hooks:
    - id: ruff-check
      args: [--fix, --exit-non-zero-on-fix, --no-cache]

- repo: https://github.com/PFCCLab/typos-pre-commit-mirror.git
  rev: v1.39.2
  hooks:
    - id: typos
      args: [--force-exclude]